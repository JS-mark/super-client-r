name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Vite build mode (e.g. production, staging)'
        required: false
        default: ''
      tag:
        description: 'Release tag (leave empty to use latest tag)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build icons
        run: pnpm build:icons

      - name: Build app
        run: |
          npx tsc -b
          MODE_FLAG="${{ github.event.inputs.mode }}"
          if [ -n "$MODE_FLAG" ]; then
            npx electron-vite build --mode "$MODE_FLAG"
          else
            npx electron-vite build
          fi

      - name: Package for macOS (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build icons
        run: pnpm build:icons

      - name: Build app
        shell: bash
        run: |
          npx tsc -b
          MODE_FLAG="${{ github.event.inputs.mode }}"
          if [ -n "$MODE_FLAG" ]; then
            npx electron-vite build --mode "$MODE_FLAG"
          else
            npx electron-vite build
          fi

      - name: Package for Windows (${{ matrix.arch }})
        run: npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: dist/*.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: artifacts/*
